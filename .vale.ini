StylesPath = .github/styles
MinAlertLevel = error

Vocab = Vale

Packages = Microsoft, write-good, proselint

# Treat Docusaurus MDX pages as markdown so they get linted too.
[formats]
mdx = md

[*.{md,mdx}]
BasedOnStyles = Vale, Microsoft, write-good, proselint
# Skip MDX machinery: import lines, JSX expressions/comments, and template
# literals inside <GoExample template={`...`}> blocks.
TokenIgnores = (?m)^import .+$, ({{[^}]*}}), (?s)(\{`.*?`\}), ({/\*.*?\*/})
# JSX component blocks aren't prose.
BlockIgnores = (?s)(<GoExample[\s\S]*?/>), (?s)(<GoSnippet[^>]*/>), (?s)(<Tabs[^>]*>|</Tabs>|<TabItem[^>]*>|</TabItem>), (<TryItValues\s*/>)

Microsoft.Dashes = NO
write-good.E-Prime = NO
write-good.TooWordy = NO
Vale.Terms = NO

[changelog.md]
Microsoft.DateOrder = NO
Microsoft.Contractions = NO
Microsoft.SentenceLength = NO

[.github/styles/*]
BasedOnStyles =
Vale.Spelling = NO
