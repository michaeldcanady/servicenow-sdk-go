name: release-please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Create release
        uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json

      - name: Checkout PR branch
        if: ${{ steps.release.outputs.pr }}
        uses: actions/checkout@v6
        with:
          # Use the head branch name from the release-please PR
          ref: ${{ fromJSON(steps.release.outputs.pr).headBranchName }}

      - name: Update {unreleased} in PR branch
        if: ${{ steps.release.outputs.pr }}
        run: |
          # Get the version proposed in the PR (it's already been bumped in the VERSION file on this branch)
          VERSION=$(cat VERSION)
          TAG="v${VERSION}"
          
          # Replace {unreleased} with the proposed tag
          find . -name "*.go" -type f -exec sed -i "s/{unreleased}/${TAG}/g" {} \;
          
          # Commit and push back to the PR branch
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Action"
          git add .
          if git commit -m "chore: replace {unreleased} with ${TAG} for release"; then
            # Since we checked out the specific ref, we can push to origin
            git push origin HEAD:${{ fromJSON(steps.release.outputs.pr).headBranchName }}
          else
            echo "No changes to commit"
          fi
