name: Weekly Preview Release

on:
  schedule:
    - cron: "0 0 * * 0" # This will run every Sunday at 00:00

env:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
        with:
          fetch-depth: 0 # This is required to get the full commit history

      - name: Set up environment
        run: |
          echo "GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> $GITHUB_ENV

      - name: Run the script
        run: |
          chmod +x ./scripts/weekly-release.sh
          ./scripts/weekly-release.sh

      - name: Set Preview Version
        run: |
          echo "PREVIEW_VERSION=${{env.UNRELEASED_VERSION}}-preview$(date +'%Y%m%d')" >> $GITHUB_ENV
        shell: bash

      - name: Create Release
        uses: "marvinpinto/action-automatic-releases@latest"
        with:
          automatic_release_tag: "v${{env.PREVIEW_VERSION}}"
          prerelease: true
          title: Preview Release v${{env.PREVIEW_VERSION}}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            changelog.md
