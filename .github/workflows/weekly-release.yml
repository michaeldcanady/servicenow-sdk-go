name: Weekly Preview Release

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1" # Weekly preview release (every Monday at 3 AM UTC)

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      should_release: ${{ steps.diff.outputs.any_changed }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Needed to fetch all tags

      - name: Get latest tag
        id: latest_tag
        run: echo "tag=$(git describe --tags --abbrev=0 || echo "")" >> $GITHUB_OUTPUT

      - name: Check for changes since latest tag
        id: diff
        uses: tj-actions/changed-files@v47.0.6
        with:
          base_sha: ${{ steps.latest_tag.outputs.tag }}

  release-please:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.should_release == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Create preview release
        uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: weekly-release-please-config.json
