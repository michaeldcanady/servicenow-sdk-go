name: Weekly Preview Release

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1" # Weekly preview release (every Monday at 3 AM UTC)

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Create preview release
        uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: weekly-release-please-config.json
