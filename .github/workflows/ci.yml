name: CI
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "**.go"
      - "!docs/snippets/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "**.go"
      - "!docs/snippets/**"
      - ".github/workflows/ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  COVERAGE_FILE: coverage.out

permissions: {}

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-please--'))
    outputs:
      code: ${{ steps.filter.outputs.any_changed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Changed Files
        uses: tj-actions/changed-files@v47.0.6
        id: filter
        with:
          files: |
            **.go
            !docs/snippets/**
            .github/workflows/ci.yml

  check-go:
    name: Check Go Modules
    needs:
      - changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        go-version: ["stable", "oldstable"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - run: go mod download
      - run: go mod verify
      - run: |
          go mod tidy
          git diff --exit-code -- .

  build-go:
    name: Build Go Code
    needs:
      - changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ["stable", "oldstable"]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: false
      - run: go mod download
      - name: Build Go Code
        run: |
          PACKAGES=$(go list ./... | grep -v "/docs")
          go build $PACKAGES

  lint-go:
    name: Lint Go Code
    needs:
      - changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        go-version: ["stable", "oldstable"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          skip-cache: false
          args: --timeout=5m

  test-go:
    name: Test Go Code
    needs:
      - changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ["stable", "oldstable"]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - name: Run tests
        run: go test -v -coverprofile=${{ env.COVERAGE_FILE }} ./...
      - name: Upload coverage to Codecov
        if: runner.os == 'Linux' && matrix.go-version == 'stable'
        uses: codecov/codecov-action@v4
        with:
          files: ./${{ env.COVERAGE_FILE }}
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  report-failure:
    name: Report CI Failure
    if: failure()
    needs: [check-go, build-go, lint-go, test-go]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Post Failure Summary
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: ci-failure-summary
          message: |
            ### ❌ CI Pipeline Failed
            One or more jobs in the CI pipeline failed.
            
            Please check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.
