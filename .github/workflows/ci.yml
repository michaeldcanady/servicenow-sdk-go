name: CI
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "**.go"
      - "!docs/snippets/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "**.go"
      - "!docs/snippets/**"
      - ".github/workflows/ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  COVERAGE_FILE: coverage.out

permissions: {}

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-please--'))
    outputs:
      code: ${{ steps.filter.outputs.any_changed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Changed Files
        uses: tj-actions/changed-files@v47.0.6
        id: filter
        with:
          files: |
            **.go
            !docs/snippets/**
            .github/workflows/ci.yml

  check-go:
    name: Check Go Modules
    needs:
      - changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        go-version: ["stable", "oldstable"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
      - run: go mod download
      - run: go mod verify
      - run: |
          go mod tidy
          git diff --exit-code -- .

  build-go:
    name: Build Go Code
    needs:
      - changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ["stable", "oldstable"]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      pull-requests: write
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
      - name: Build Go Code
        run: |
          PACKAGES=$(go list ./... | grep -v "/docs")
          go build $PACKAGES

  lint-go:
    name: Lint Go Code
    needs:
      - changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        go-version: ["stable", "oldstable"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          skip-cache: false
          args: --timeout=5m

  test-go:
    name: Test Go Code
    needs:
      - changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ["stable", "oldstable"]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      pull-requests: write
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - name: Install tparse
        run: |
          go install github.com/mfridman/tparse@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
      - name: Run tests
        id: run-tests
        run: |
          go test -json -v ./... > test-output.json || echo "test_failed=true" >> $GITHUB_OUTPUT
      - name: Post Test Failures
        if: steps.run-tests.outputs.test_failed == 'true'
        shell: bash
        run: |
          echo "### ❌ Test Failures" > test-summary.md
          tparse -file test-output.json -format markdown >> test-summary.md || echo "tparse failed, but proceeding"
          # Use a GitHub Action output to pass multi-line content safely instead of GITHUB_ENV
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "SUMMARY<<$EOF" >> $GITHUB_OUTPUT
          cat test-summary.md >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT
        id: create-summary
      - name: Post Sticky Comment
        if: steps.run-tests.outputs.test_failed == 'true'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: test-failure-summary
          message: ${{ steps.create-summary.outputs.SUMMARY }}
      - name: Delete Test Failure Comment
        if: steps.run-tests.outputs.test_failed != 'true'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: test-failure-summary
          delete: true
      - name: Upload coverage to Codecov
        if: runner.os == 'Linux' && matrix.go-version == 'stable'
        uses: codecov/codecov-action@v4
        with:
          files: ./${{ env.COVERAGE_FILE }}
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
