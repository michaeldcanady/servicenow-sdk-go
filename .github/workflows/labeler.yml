name: Labeler

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize

permissions: {}

jobs:
  label:
    name: Apply Path Labels
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/labeler@v6
        with:
          configuration-path: .github/labeler.yml
          sync-labels: true
