name: "Lint PR Title"

on:
  pull_request:
    types:
      - opened
      - reopened
      - edited
      - synchronize

jobs:
  main:
    name: Validate PR Title
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Configure which types are allowed.
          # Default: https://github.com/commitlint/config-conventional#type-enum
          types: |
            fix
            feat
            chore
            docs
            style
            refactor
            perf
            test
          # Configure that the PR title must contain a description
          requireScope: false
