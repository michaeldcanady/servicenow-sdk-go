name: Documentation CI/CD

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"

env:
  PYTHON_VERSION: "3.x"

jobs:
  changes-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-please--'))
    outputs:
      docs: ${{ steps.filter.outputs.any_changed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Changed Files
        uses: tj-actions/changed-files@v47.0.6
        id: filter
        with:
          files: |
            docs/**
            mkdocs.yml
            .github/workflows/docs.yml

  build:
    name: build-md
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: ${{ needs.changes-docs.outputs.docs == 'true' }}
    needs:
      - changes-docs
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: sudo apt-get install -y pngquant

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Build docs
        run: mkdocs build --strict

      - name: Upload site artifact
        uses: actions/upload-artifact@v7
        with:
          name: site
          path: site

  lint:
    name: lint-md
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: ${{ needs.changes-docs.outputs.docs == 'true' }}
    needs:
      - changes-docs
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Vale Linter
        uses: errata-ai/vale-action@2.1.2
        with:
          fail_on_error: true
          files: docs
          filter_mode: nofilter
          reporter: local
          level: error

  deploy:
    name: deploy-docs
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    needs:
      - build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install system dependencies
        run: sudo apt-get install -y pngquant

      - name: Deploy to GitHub Pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mkdocs gh-deploy --force --config-file mkdocs.yml

  report-failure:
    name: Report Docs Failure
    if: failure()
    needs: [build, lint]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Post Failure Summary
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: docs-failure-summary
          message: |
            ### ❌ Documentation CI/CD Failed
            One or more jobs in the Documentation pipeline failed.
            
            Please check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.
