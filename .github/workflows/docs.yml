name: Documentation CI/CD

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "website/**"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "website/**"
      - ".github/workflows/docs.yml"

env:
  NODE_VERSION: "20"

jobs:
  changes-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-please--'))
    outputs:
      docs: ${{ steps.filter.outputs.any_changed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Changed Files
        uses: tj-actions/changed-files@v47.0.6
        id: filter
        with:
          files: |
            website/**
            .github/workflows/docs.yml

  build:
    name: build-site
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: ${{ needs.changes-docs.outputs.docs == 'true' }}
    needs:
      - changes-docs
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Vet Go snippets
        run: go vet -tags snippets ./website/snippets/

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Build docs
        working-directory: website
        run: npm run build

      - name: Upload site artifact
        uses: actions/upload-artifact@v7
        with:
          name: site
          path: website/build

  lint:
    name: lint-md
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: ${{ needs.changes-docs.outputs.docs == 'true' }}
    needs:
      - changes-docs
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Vale Linter
        uses: errata-ai/vale-action@2.1.2
        with:
          fail_on_error: true
          files: website/docs
          filter_mode: nofilter
          reporter: local
          level: error

  deploy:
    name: deploy-docs
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs:
      - build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Build docs
        working-directory: website
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: website/build

  report-failure:
    name: Report Docs Failure
    if: failure()
    needs: [build, lint]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Post Failure Summary
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: docs-failure-summary
          message: |
            ### ❌ Documentation CI/CD Failed
            One or more jobs in the Documentation pipeline failed.

            Please check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.
