version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    groups:
      go-dependencies:
        update-types:
          - minor
          - patch

  - package-ecosystem: "npm"
    directory: "/website"
    schedule:
      interval: weekly
    groups:
      website-dependencies:
        update-types:
          - minor
          - patch

  - package-ecosystem: "devcontainers"
    directory: "/"
    schedule:
      interval: daily

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
