version: "2"
linters:
  enable:
    - dogsled
    - gocognit
    - gosec
    - misspell
    - nakedret
    - staticcheck
    - unconvert
    - unparam
    - whitespace
    - gocyclo
    - errcheck
    - dupl
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gocyclo
          - errcheck
          - dupl
          - gosec
          - typecheck
issues:
  exclude-files:
    - docs/snippets/.*\.go
formatters:
  enable:
    - gofmt
run:
  build-tags:
    - preview.query
