version: "2"
linters:
  enable:
    - dogsled
    - gocognit
    - gosec
    - misspell
    - nakedret
    - staticcheck
    - unconvert
    - unparam
    - whitespace
    - gocyclo
    - errcheck
    - dupl
issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gocyclo
        - errcheck
        - dupl
        - gosec
        - typecheck
  exclude-paths:
    - docs/snippets/.*\.go
formatters:
  enable:
    - gofmt
run:
  build-tags:
    - preview.query
