version: "2"
linters:
  enable:
    - dogsled
    - gocognit
    - gosec
    - misspell
    - nakedret
    - staticcheck
    - unconvert
    - unparam
    - whitespace
rules:
  - path: _test\.go
    linters:
      - gocyclo
      - errcheck
      - dupl
      - gosec
exclusions:
  generated: lax
  presets:
    - comments
    - common-false-positives
    - legacy
    - std-error-handling
  paths:
    - third_party$
    - builtin$
    - examples$
    - docs/assets/snippets/.*\.go$
formatters:
  enable:
    - gofmt
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
      - docs/assets/snippets/.*\.go$
