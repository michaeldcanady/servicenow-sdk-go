version: "2"
run:
  build-tags:
    - preview.query
linters:
  enable:
    - dogsled
    - dupl
    - errcheck
    - gocognit
    - gocyclo
    - gosec
    - misspell
    - nakedret
    - staticcheck
    - unconvert
    - unparam
    - whitespace
  settings:
    dupl:
      threshold: 200
  exclusions:
    rules:
      - linters:
          - dupl
          - errcheck
          - gocyclo
          - gosec
          - typecheck
        path: _test\.go
      - path: (actsub-api|documents-api|table-api)/.*
        linters:
          - dupl
    paths:
      - docs/snippets/.*\.go
formatters:
  enable:
    - gofmt
